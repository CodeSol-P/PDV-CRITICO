<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Crítico - Registro de Visitas</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div id="app-container" class="app-layout">

        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">
                    <span class="material-icons">store</span>
                    PDV Crítico
                </h1>
                <p class="app-subtitle">Registro de Visitas a Puntos de Venta · Grupo Cargo SA</p>
            </div>
            <div class="header-actions">
                <button id="btn-template" class="btn btn-icon" title="Descargar plantilla Excel">
                    <span class="material-icons">file_download</span>
                </button>
                <button id="btn-export" class="btn btn-icon" title="Exportar registros a Excel">
                    <span class="material-icons">cloud_download</span>
                </button>
                <button id="btn-import" class="btn btn-icon" title="Importar desde Excel (requiere autorización)">
                    <span class="material-icons">upload_file</span>
                </button>
                <input type="file" id="file-import-excel" accept=".xlsx,.xls" style="display:none;">
            </div>
        </header>

        <!-- Toolbar -->
        <div class="nav-tabs" style="justify-content: space-between; padding: 0 24px; flex-wrap: wrap; gap: 8px;">
            <div style="display:flex; gap:12px; align-items:center;">
                <button id="btn-add-visita" class="btn btn-primary">
                    <span class="material-icons">add</span>
                    Nuevo Registro
                </button>
                <span id="record-count" style="font-size:13px; color:#666;"></span>
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
                <input type="text" id="search-input" class="search-input"
                       placeholder="Buscar por cliente, PDV, dirección..."
                       style="min-width:280px;">
            </div>
        </div>

        <!-- Leyenda de botones de cabecera -->
        <div style="background:#F3F4F6; border-bottom:1px solid #e0e0e0; padding:6px 24px; display:flex; gap:24px; font-size:12px; color:#666;">
            <span><span class="material-icons" style="font-size:14px; vertical-align:middle;">file_download</span> Plantilla</span>
            <span><span class="material-icons" style="font-size:14px; vertical-align:middle;">cloud_download</span> Exportar Excel</span>
            <span><span class="material-icons" style="font-size:14px; vertical-align:middle;">upload_file</span> Importar Excel</span>
        </div>

        <!-- Contenido principal -->
        <main class="main-content">
            <section id="visitas-view" class="view active">
                <div id="visitas-list" class="table-container"></div>
            </section>
        </main>

        <!-- Modal Container -->
        <div id="modal-container"></div>

        <!-- Toast Container -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="loading-overlay active">
            <div class="spinner"></div>
        </div>

    </div>

    <!-- Librerías externas -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <!-- uuid reemplazado por crypto.randomUUID() nativo del browser -->

    <!-- Configuración -->
    <script src="js/config.js"></script>

    <!-- Utilidades -->
    <script src="js/utils/Logger.js"></script>
    <script src="js/utils/DateUtils.js"></script>
    <script src="js/utils/FileUtils.js"></script>
    <script src="js/utils/ValidationUtils.js"></script>
    <script src="js/utils/FormatUtils.js"></script>

    <!-- Storage -->
    <script src="js/storage/IndexedDBManager.js"></script>
    <script src="js/storage/ExcelManager.js"></script>

    <!-- Servicios -->
    <script src="js/services/EventBus.js"></script>

    <!-- Modelos -->
    <script src="js/models/BaseModel.js"></script>
    <script src="js/models/VisitaModel.js"></script>

    <!-- Vistas -->
    <script src="js/views/BaseView.js"></script>
    <script src="js/views/ModalView.js"></script>
    <script src="js/views/VisitaView.js"></script>

    <!-- Auth Service (requiere ModalView) -->
    <script src="js/services/AuthService.js"></script>

    <!-- Controladores -->
    <script src="js/controllers/VisitaController.js"></script>

    <!-- App principal -->
    <script src="js/main.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDV Crítico - Registro de Visitas</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css"/>
</head>
<body>
    <div id="app-container" class="app-layout">

        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="app-title">
                    <img src="Logo_blanco_GrupoCargo.png" alt="Grupo Cargo SA"
                         style="height:50px; width:auto; object-fit:contain;">
                    <span style="font-size:45px; font-weight:700;">PDV Crítico</span>
                </h1>
        
            </div>
            <img src="Tico Saluda Cerca.png" alt="Tico"
                 style="position:absolute; bottom:0; right:24px; height:150px; width:auto; object-fit:contain; z-index:1;">
        </header>

        <!-- Tab Navigation -->
        <div class="nav-tabs tab-nav-bar">
            <button id="tab-registros" class="tab-btn active">
                <span class="material-icons">list_alt</span>
                Registros
            </button>
            <button id="tab-dashboard" class="tab-btn">
                <span class="material-icons">dashboard</span>
                Dashboard
            </button>
            <button id="tab-mapa" class="tab-btn">
                <span class="material-icons">map</span>
                Mapa
            </button>
        </div>

        <!-- Toolbar (solo Registros) -->
        <div id="toolbar-registros" class="toolbar-registros">
            <div class="toolbar-left">
                <button id="btn-add-visita" class="btn btn-primary">
                    <span class="material-icons">add</span>
                    <span class="btn-label">Nuevo Registro</span>
                </button>
                <span id="record-count" class="record-count"></span>
            </div>
            <div class="toolbar-right">
                <button id="btn-export" class="btn btn-secondary" title="Descargar registros en Excel">
                    <span class="material-icons">download</span>
                    <span class="btn-label">Descargar</span>
                </button>
                <input type="text" id="search-input" class="search-input"
                       placeholder="Buscar PDV, cliente...">
            </div>
        </div>

        <!-- Contenido principal -->
        <main class="main-content">
            <section id="visitas-view" class="view active">
                <div id="visitas-list"></div>
            </section>
            <section id="dashboard-view" class="view">
                <!-- Renderizado por DashboardView -->
            </section>
            <section id="mapa-view" class="view">
                <!-- Renderizado por MapaController -->
            </section>
        </main>

        <!-- Modal Container -->
        <div id="modal-container"></div>

        <!-- Toast Container -->
        <div id="toast-container" class="toast-container"></div>

        <!-- Loading Overlay -->
        <div id="loading-overlay" class="loading-overlay active">
            <div class="spinner"></div>
        </div>

    </div>

    <!-- Librerías externas -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>

    <!-- Configuración -->
    <script src="js/config.js"></script>

    <!-- Utilidades -->
    <script src="js/utils/Logger.js"></script>
    <script src="js/utils/DateUtils.js"></script>
    <script src="js/utils/FileUtils.js"></script>
    <script src="js/utils/ValidationUtils.js"></script>
    <script src="js/utils/FormatUtils.js"></script>

    <!-- Storage -->
    <script src="js/storage/SupabaseManager.js"></script>
    <script src="js/storage/ExcelManager.js"></script>

    <!-- Servicios -->
    <script src="js/services/EventBus.js"></script>

    <!-- Modelos -->
    <script src="js/models/BaseModel.js"></script>
    <script src="js/models/VisitaModel.js"></script>

    <!-- Vistas -->
    <script src="js/views/BaseView.js"></script>
    <script src="js/views/ModalView.js"></script>
    <script src="js/views/VisitaView.js"></script>
    <script src="js/views/DashboardView.js"></script>

    <!-- Auth Service (requiere ModalView) -->
    <script src="js/services/AuthService.js"></script>

    <!-- Controladores -->
    <script src="js/controllers/VisitaController.js"></script>
    <script src="js/controllers/DashboardController.js"></script>
    <script src="js/controllers/MapaController.js"></script>

    <!-- App principal -->
    <script src="js/main.js"></script>
</body>
</html>
